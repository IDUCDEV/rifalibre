name: rifalibre
description: Plataforma para crear y gestionar rifas automáticamente en Venezuela
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Dependency Injection
  get_it: ^7.6.4
  
  # Network
  dio: ^5.3.3
  connectivity_plus: ^5.0.2
  
  # Supabase
  supabase_flutter: ^2.5.0
  
  # Storage
  cached_network_image: ^3.3.0
  
  # UI Components
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  
  # Utils
  share_plus: ^7.2.1
  url_launcher: ^6.2.2
  image_picker: ^1.0.5
  path_provider: ^2.1.1
  intl: ^0.18.1
  uuid: ^4.2.1
  
  # QR Code
  qr_flutter: ^4.1.0
  
  # Screenshots
  screenshot: ^2.1.0
  
  # Ads (optional)
  google_mobile_ads: ^3.0.0
  
  # Navigation
  go_router: ^12.1.1
  
  # Form validation
  formz: ^0.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  bloc_test: ^9.1.5
  mocktail: ^1.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700